<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="img/iconnnn.jpg" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        .btn-itz { background-color: #1b396a; color: white; border: none; }
        .btn-itz:hover { background-color: #11264a; color: white; }
        .text-itz { color: #1b396a !important; }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="card p-5 shadow-lg border-0 rounded-4 text-center" style="max-width: 400px; width: 100%;">
        <h1 class="h3 mb-4 fw-bold text-itz">Contraseña</h1>
        
        <input type="password" id="inputPassword" class="form-control form-control-lg mb-3 text-center" placeholder="Ingresa tu clave">
        
        <p id="mensajeError" class="text-danger d-none small mb-3">Contraseña incorrecta, intenta de nuevo.</p>

        <button onclick="validar()" class="btn btn-itz btn-lg w-100 shadow-sm fw-bold">Aceptar</button>
        <a href="menuPrincipal.html" class="btn btn-outline-secondary btn-lg w-100 mt-2">Regresar</a>
    </div>

    <script>
        function validar() {
            let pass = document.getElementById("inputPassword").value;
            if (pass === "1234") {
                window.location.href = "interfasExpretoInicio.html";
            } else {
                document.getElementById("mensajeError").classList.remove("d-none");
            }
        }
    </script>
</body>
</html>
